name: Publish AUR

# Runs after Release succeeds so the AUR package always points at a tag
# whose artifacts already exist on the GitHub Release page. Bumps
# PKGBUILD pkgver + regenerates .SRCINFO + pushes to
# ssh://aur@aur.archlinux.org/hydra-ensemble-bin.git.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  # Manual re-run path — if the workflow failed mid-pipeline (usually
  # because the GH Release API hadn't exposed the AppImage yet) we want
  # to retry without having to bump the version and re-tag. Dispatch
  # with the tag you want to republish (defaults to the latest release).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.1). Leave empty for the latest release."
        required: false
        default: ""

concurrency:
  group: release-aur-${{ github.event.workflow_run.head_branch || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  update-aur:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag + version
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "${RUN_BRANCH:-}" ]; then
            TAG="$RUN_BRANCH"
          else
            # Manual dispatch with no tag specified — pick the most recent release.
            TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::could not resolve a tag to publish"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Wait for GitHub's Release API to expose the x86_64 AppImage that
      # the Release job just uploaded. workflow_run fires the instant the
      # parent workflow's status flips, which can beat the release asset
      # publish by a few seconds.
      - name: Wait for AppImage asset
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # electron-builder only ships a single linux AppImage per tag
          # (x86_64 by default), so skip any arch-specific filtering and
          # grab the first .AppImage in the release. Keeping this simple
          # avoids the jq precedence trap that bit us the first time —
          # the arch suffix convention is not stable across builders.
          for i in $(seq 1 30); do
            URL=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '[.assets[] | select(.name | endswith(".AppImage"))][0].url' 2>/dev/null || true)
            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              NAME=$(basename "$URL")
              echo "name=$NAME" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "AppImage not published yet (attempt $i/30), sleeping"
            sleep 10
          done
          echo "::error::AppImage asset did not appear in release $TAG"
          exit 1

      - name: Download AppImage + checksum
        id: checksum
        env:
          URL: ${{ steps.asset.outputs.url }}
        run: |
          set -euo pipefail
          curl -fLsS -o appimage.bin "$URL"
          SHA=$(sha256sum appimage.bin | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          # ssh-keyscan can flake on transient DNS / connect timeouts.
          # Retry up to 3× with backoff, with a 10s per-host timeout.
          # If all attempts fail, drop to StrictHostKeyChecking=accept-new
          # in the ssh config so the FIRST git fetch picks up + persists
          # the host key on its own; subsequent runs verify against it.
          KEYSCAN_OK=0
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -t ed25519,rsa aur.archlinux.org \
              >> ~/.ssh/known_hosts 2>/dev/null; then
              KEYSCAN_OK=1
              break
            fi
            sleep $((attempt * 2))
          done

          {
            echo "Host aur.archlinux.org"
            echo "  IdentityFile ~/.ssh/aur"
            echo "  IdentitiesOnly yes"
            echo "  User aur"
            if [ "$KEYSCAN_OK" -eq 0 ]; then
              echo "  StrictHostKeyChecking accept-new"
              echo "  UserKnownHostsFile ~/.ssh/known_hosts"
            fi
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        run: |
          set -euo pipefail
          # AUR's SSH endpoint rate-limits connections per IP. GitHub
          # runners share IPs and we sometimes hit it after the keyscan
          # opened a connection earlier in the job. Retry up to 5× with
          # exponential backoff so a transient `kex_exchange_identification:
          # Connection closed` doesn't fail the whole release.
          for attempt in 1 2 3 4 5; do
            if git clone ssh://aur@aur.archlinux.org/hydra-ensemble-bin.git aur-repo; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::failed to clone AUR repo after 5 attempts"
              exit 1
            fi
            DELAY=$((attempt * 15))
            echo "clone attempt $attempt failed; sleeping ${DELAY}s before retry"
            sleep "$DELAY"
            rm -rf aur-repo
          done
          cd aur-repo
          git config user.email "birisesports@gmail.com"
          git config user.name "Hydra Release Bot"

      - name: Update PKGBUILD
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
          APPIMAGE_NAME: ${{ steps.asset.outputs.name }}
          APPIMAGE_URL: ${{ steps.asset.outputs.url }}
          ICON_URL: https://raw.githubusercontent.com/javabetatester/hydra-ensemble/v${{ steps.tag.outputs.version }}/resources/icon.png
        run: |
          set -euo pipefail
          cd aur-repo
          python3 - <<'PY'
          import os, re, pathlib
          version = os.environ['VERSION']
          sha = os.environ['SHA256']
          appimage_url = os.environ['APPIMAGE_URL']
          icon_url = os.environ['ICON_URL']
          path = pathlib.Path('PKGBUILD')
          text = path.read_text()
          text = re.sub(r'^pkgver=.*$', f'pkgver={version}', text, flags=re.MULTILINE)
          text = re.sub(r'^pkgrel=.*$', 'pkgrel=1', text, flags=re.MULTILINE)
          # Preserve ALL three sources that package() consumes:
          #   * the AppImage (renamed to match ${_pkgname}-${pkgver}.AppImage,
          #     which is what install(1) looks for under $srcdir)
          #   * the .desktop file (tracked locally in the AUR repo — SKIP)
          #   * the icon.png (fetched fresh from the tag — SKIP, tag is
          #     already an immutable checksum)
          # Dropping .desktop / .png from source= (as we did previously) left
          # package() calling install on files makepkg never materialised.
          new_source = (
              f'source=("hydra-ensemble-{version}.AppImage::{appimage_url}"\n'
              f'        "hydra-ensemble.desktop"\n'
              f'        "hydra-ensemble.png::{icon_url}")'
          )
          text = re.sub(
              r'^source=\(.*?\)$',
              lambda _m: new_source,
              text,
              flags=re.MULTILINE | re.DOTALL,
          )
          new_sums = (
              f"sha256sums=('{sha}'\n"
              f"            'SKIP'\n"
              f"            'SKIP')"
          )
          text = re.sub(
              r"^sha256sums=\(.*?\)$",
              lambda _m: new_sums,
              text,
              flags=re.MULTILINE | re.DOTALL,
          )
          path.write_text(text)
          PY
          cat PKGBUILD

      - name: Regenerate .SRCINFO via makepkg
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: -v ${{ github.workspace }}/aur-repo:/pkg
          run: |
            useradd -m builder
            chown -R builder:builder /pkg
            pacman -Syu --noconfirm base-devel
            su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'

      # The Docker step above chowned /pkg to the in-container builder user.
      # That bind-mount is the host's aur-repo/, so the runner's default user
      # loses write access to aur-repo/.git/ and the next git commit fails
      # with "Permission denied" on .git/index.lock. Reclaim ownership.
      - name: Reclaim aur-repo ownership from docker
        run: sudo chown -R "$USER:$USER" aur-repo

      - name: Commit + push to AUR
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "Update to ${VERSION}"
          GIT_SSH_COMMAND='ssh -F ~/.ssh/config' git push
