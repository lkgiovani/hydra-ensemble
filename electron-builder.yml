appId: com.intuitivecompute.hydra
productName: Hydra Ensemble
copyright: Copyright (C) 2026 Intuitive Compute
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - "!**/*.{md,ts,tsx,map,test.ts,test.tsx}"
asarUnpack:
  - "**/node_modules/node-pty/**"
extends: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: Intuitive Compute <support@intuitivecompute.com>
  synopsis: Orchestrate parallel Claude Code agents
  description: |
    Hydra Ensemble is a multi-agent orchestrator for Claude Code:
    each session is its own agent (avatar, branch, live status),
    backed by git worktree isolation and a built-in toolkit. Watch
    a many-headed pack of Claudes work in parallel without ever
    switching tabs.
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Hydra Ensemble
publish:
  provider: github
  owner: javabetatester
  repo: HydraEnsemble
